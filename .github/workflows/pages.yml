name: pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32-unknown-emscripten

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: "3.1.74"
          actions-cache-folder: emsdk-cache

      - name: Install setup prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget binutils
          python3 -m pip install --upgrade pip setuptools wheel

      - name: Build uiCA runtime artifacts
        run: |
          bash ./setup.sh
          test -f rust/uica-data/generated/manifest.json
          test -f rust/uica-data/generated/arch/SKL.uipack
          git submodule update --init XED-to-XML mbuild

      - name: Verify generated UIPacks are not committed inputs
        run: |
          if git ls-files --error-unmatch rust/uica-data/generated/manifest.json >/dev/null 2>&1; then
            echo "rust/uica-data/generated/manifest.json must not be committed" >&2
            exit 1
          fi
          if git ls-files --error-unmatch rust/uica-data/generated/arch/SKL.uipack >/dev/null 2>&1; then
            echo "rust/uica-data/generated/arch/*.uipack must not be committed" >&2
            exit 1
          fi

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --locked
          fi

      - name: Build Pages artifact
        run: |
          ./scripts/build-web.sh
          ./scripts/smoke-emscripten-exports.sh dist/emscripten
          test -f dist/CNAME
          test "$(cat dist/CNAME)" = "uica.houmus.org"
          test -f dist/index.html
          test -f dist/test-pure-wasm.html
          test -f dist/pkg/uica_wasm.js
          test -f dist/pkg/uica_wasm_bg.wasm
          test -f dist/emscripten/uica_emscripten.js
          test -f dist/emscripten/uica_emscripten.wasm
          test -f dist/uipack-cache.js
          test -f dist/data/manifest.json
          test -f dist/data/arch/SKL.uipack
          python3 - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('dist/data/manifest.json').read_text())
          missing = []
          for arch, entry in manifest['architectures'].items():
              path = Path('dist/data') / entry['path']
              if not path.exists():
                  missing.append((arch, str(path)))
          if missing:
              raise SystemExit(f'missing UIPack files: {missing}')
          PY

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
