<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/><title>Execution Trace</title>

<style>
body {
    font-family: Arial, sans-serif;
    min-width: 1280px;
}

table, td, th {
    border: 1px solid black;
}

th, .textCell {
    padding: 1px 5px;
}

td {
    text-align: center;
}

code {
    white-space: nowrap;

}

.cycleHeader span {
    vertical-align: middle;
    font-weight: normal;
    font-size: 12px;
    display: inline-block;
    min-width: 1em;
    text-align: center;
    white-space: nowrap;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
}

.cycleHeader {
    min-width: 12.5px;
    position: relative;
    padding: 1px;
}
.cycleHeader::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: -10000000px;
    background-color: #f2f2f2;
    z-index: -1;
}
.cycleHeader:nth-child(even)::before {
    background-color: white;
}

.range-control {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.range-slider {
    --range-track-top: 16px;
    --range-track-height: 4px;
    --range-thumb-size: 18px;
    --range-input-top: 9px;
    position: relative;
    width: min(900px, 100%);
    height: 36px;
    flex-grow: 1;
}

.range-track {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--range-track-top);
    height: var(--range-track-height);
    border-radius: 999px;
    background: #d0d0d0;
}

.range-selected {
    position: absolute;
    top: var(--range-track-top);
    height: var(--range-track-height);
    border-radius: 999px;
    background: #3a7afe;
}

.range-slider input[type="range"] {
    position: absolute;
    left: 0;
    top: var(--range-input-top);
    width: 100%;
    height: var(--range-thumb-size);
    margin: 0;
    pointer-events: none;
    appearance: none;
    background: transparent;
}

.range-slider input[type="range"]::-webkit-slider-thumb {
    pointer-events: auto;
    appearance: none;
    width: var(--range-thumb-size);
    height: var(--range-thumb-size);
    border-radius: 50%;
    border: 2px solid #1f4fbf;
    background: white;
    cursor: pointer;
}

.range-slider input[type="range"]::-moz-range-thumb {
    pointer-events: auto;
    width: var(--range-thumb-size);
    height: var(--range-thumb-size);
    border-radius: 50%;
    border: 2px solid #1f4fbf;
    background: white;
    cursor: pointer;
}

.range-slider input[type="range"]::-webkit-slider-runnable-track {
    appearance: none;
    background: transparent;
}

.range-slider input[type="range"]::-moz-range-track {
    background: transparent;
}

.iteration-input {
    max-width: 80px;
}
</style>

<script>
var tableData = {}

var eventToColor = {
    "P": "Cyan",
    "Q": "LightSkyBlue",
    "I": "Pink",
    "r": "OrangeRed",
    "D": "Orange",
    "E": "Yellow",
    "R": "ForestGreen",
}

function clampIteration(value, maxIt) {
    if (!Number.isFinite(value)) return 0
    return Math.floor(Math.min(maxIt, Math.max(0, value)))
}

function syncRangeControls(firstIt, lastIt) {
    var maxIt = Math.max(0, tableData.length - 1)
    firstIt = clampIteration(firstIt, maxIt)
    lastIt = clampIteration(lastIt, maxIt)
    if (lastIt < firstIt) lastIt = firstIt

    for (let id of ['firstIt', 'firstItRange']) {
        document.getElementById(id).value = String(firstIt)
    }
    for (let id of ['lastIt', 'lastItRange']) {
        document.getElementById(id).value = String(lastIt)
    }

    var selected = document.getElementById('rangeSelected')
    var denom = maxIt == 0 ? 1 : maxIt
    selected.style.left = `${(firstIt / denom) * 100}%`
    selected.style.width = `${((lastIt - firstIt) / denom) * 100}%`

    return [firstIt, lastIt]
}

function createTable() {
    if (tableData.length == 0) {
        syncRangeControls(0, 0)
        document.getElementById('traceTable').innerHTML = ''
        return
    }

    var firstInput = document.getElementById('firstIt')
    var lastInput = document.getElementById('lastIt')
    var [firstIt, lastIt] = syncRangeControls(Number(firstInput.value), Number(lastInput.value))

    var minCycle = Number.MAX_VALUE
    var maxCycle = 0

    for (let i = firstIt; i <= lastIt; i++) {
        for (let instr of tableData[i]) {
            for (let uop of instr.uops) {
                for (let c in uop.events) {
                    minCycle = Math.min(minCycle, Number(c))
                    maxCycle = Math.max(maxCycle, Number(c))
                }
            }
        }
    }

    tableHtml = '<tr>'
    tableHtml += '<th rowspan="2" style="vertical-align: bottom">It.</th>'
    tableHtml += '<th rowspan="2" style="vertical-align: bottom; text-align:left">Instruction</th>'
    tableHtml += '<th colspan="2">&mu;ops</th>'
    tableHtml += `<th colspan="${maxCycle+1}" style="text-align:left">Cycle</th>`
    tableHtml += '</tr>'
    tableHtml += '<tr>'
    tableHtml += '<th>Possible Ports</th>'
    tableHtml += '<th>Actual Port</th>'
    for (let i = minCycle; i <= maxCycle; i++) {
        tableHtml += `<th class="cycleHeader"><span>${i}</span></th>`
    }
    tableHtml += '</tr>'

    for (let i = firstIt; i <= lastIt; i++) {
        var nLinesIt = 0
        for (let instr of tableData[i]) {
            nLinesIt += instr.uops.length
        }
        tableHtml += '<tr style="border-top: 2px solid black">'
        tableHtml += `<td rowspan="${nLinesIt}" class="textCell">${i}</td>`
        for (let [instrI, instr] of tableData[i].entries()) {
            if (instrI > 0) tableHtml += '<tr>'
            tableHtml += `<td rowspan="${instr.uops.length}" class="textCell" style="text-align: left"><code>${instr.str}</code></td>`

            for (let [uopI, uop] of instr.uops.entries()) {
                if (uopI > 0) tableHtml += '<tr>'
                tableHtml += `<td class="textCell">${uop.possiblePorts}</td>`
                tableHtml += `<td class="textCell">${uop.actualPort}</td>`

                if (Object.keys(uop.events).length == 0) {
                    tableHtml += '<td colspan="' + (maxCycle - minCycle + 1) + '"></td></tr>'
                } else {
                    minUopCycle = Math.min(...Object.keys(uop.events));
                    maxUopCycle = Math.max(...Object.keys(uop.events));

                    if (minUopCycle - minCycle > 0)
                        tableHtml += '<td colspan="' + (minUopCycle - minCycle) + '"></td>'

                    events = Object.entries(uop.events)
                    for (let j = 0; j < events.length; j++) {
                        tableHtml += '<td style="background-color:' + eventToColor[events[j][1]] + '">' + events[j][1] + '</td>'
                        if ((j < events.length - 1) && (Number(events[j+1][0]) > Number(events[j][0]) + 1)) {
                            bg = `background-image: linear-gradient(to right, ${eventToColor[events[j][1]]} , ${eventToColor[events[j+1][1]]})`
                            tableHtml += '<td style="' + bg + '" colspan="' + (Number(events[j+1][0]) - Number(events[j][0]) - 1) + '"></td>'
                        }
                    }
                    if (maxUopCycle - minCycle < maxCycle - minCycle) {
                        tableHtml += '<td colspan="' + ((maxCycle - minCycle) - (maxUopCycle - minCycle)) + '"></td>'
                    }
                    tableHtml += '</tr>'
                }
            }
        }
    }

    document.getElementById('traceTable').innerHTML = tableHtml
}

function createLegend() {
    legendHtml = ''
    for (let [ev, expl] of [['P', 'Predecoded'], ['Q', 'Added to IDQ'], ['I', 'Issued'], ['r', 'Ready for dispatch'],
                              ['D', 'Dispatched'], ['E', 'Executed'], ['R', 'Retired']]) {
        legendHtml += `<tr><td style="background-color:${eventToColor[ev]}">${ev}</td>`
        legendHtml += `<td style="padding-left: 10px; text-align:left; border: 0">${expl}</td></tr>`
    }
    document.getElementById('legendTable').innerHTML = legendHtml
}

document.addEventListener('DOMContentLoaded', function() {
    createLegend()

    var maxIt = Math.max(0, tableData.length - 1)
    for (let id of ['firstIt', 'lastIt', 'firstItRange', 'lastItRange']) {
        var control = document.getElementById(id)
        control.min = 0
        control.max = maxIt
        control.step = 1
    }

    syncRangeControls(0, Math.min(50, maxIt))

    document.getElementById('firstIt').addEventListener('change', createTable)
    document.getElementById('lastIt').addEventListener('change', createTable)
    document.getElementById('firstItRange').addEventListener('input', function(ev) {
        syncRangeControls(Number(ev.target.value), Number(document.getElementById('lastIt').value))
        createTable()
    })
    document.getElementById('lastItRange').addEventListener('input', function(ev) {
        syncRangeControls(Number(document.getElementById('firstIt').value), Number(ev.target.value))
        createTable()
    })

    createTable()
});
</script>
</head>
<body>
<h1>Execution Trace</h1>

<table id="legendTable" style="border: 0; border-collapse:separate;"></table>

<p>
    <div class="range-control">
        <label for="firstIt">Show iterations from:</label>
        <input id="firstIt" class="iteration-input" type="number" step="1"/>
        <label for="lastIt">to:</label>
        <input id="lastIt" class="iteration-input" type="number" step="1"/>
        <div class="range-slider" aria-label="Iteration range slider">
            <div class="range-track"></div>
            <div id="rangeSelected" class="range-selected"></div>
            <input id="firstItRange" type="range" aria-label="First iteration"/>
            <input id="lastItRange" type="range" aria-label="Last iteration"/>
        </div>
    </div>
</p>

<h3></h3>
<table id="traceTable" style="border-collapse: collapse; overflow:hidden;"></table>
</body>
</html>
